<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentHub42 - MVP</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 20px; max-width: 1100px; }
      .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
      .grid { display: grid; gap: 8px; }
      input, textarea, button { width: 100%; padding: 8px; box-sizing: border-box; }
      button { cursor: pointer; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .small { font-size: 12px; color: #555; }
      .badge { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; margin-left: 8px; }
      .badge.free { background:#e8ffea; color:#095f15; }
      .badge.paid { background:#fff4e1; color:#9a5c00; }
      .tasks-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
      @media (max-width: 860px) { .tasks-columns { grid-template-columns: 1fr; } }
      #message { padding: 10px; border-radius: 6px; margin-bottom: 10px; display: none; }
      #message.error { background: #ffe6e6; color: #8a0000; }
      #message.ok { background: #e8ffea; color: #095f15; }
    </style>
  </head>
  <body>
    <h1>AgentHub42 (MVP)</h1>
    <p class="small">Configure <code>apiBase</code> no JS para seu backend.</p>

    <div id="message"></div>

    <section class="card">
      <h2>Criar Task</h2>
      <form id="createTaskForm" class="grid">
        <input id="agentId" placeholder="agent_id (obrigatório)" required />
        <input id="title" placeholder="Título" maxlength="140" required />
        <textarea id="description" placeholder="Descrição" maxlength="4000" required></textarea>

        <label>
          <input type="checkbox" id="isFreeTask" checked /> Task gratuita
        </label>

        <div id="paymentFields" class="row" style="display:none;">
          <input id="price" type="number" min="0.0001" step="0.0001" placeholder="Preço" />
          <input id="token" placeholder="Token (ex: usdc)" maxlength="20" />
        </div>

        <button type="submit">Criar</button>
      </form>
    </section>

    <section class="tasks-columns">
      <div class="card">
        <h2>Tarefas Gratuitas (Esquerda)</h2>
        <div id="freeTasks"></div>
      </div>

      <div class="card">
        <h2>Tarefas Pagas (Direita)</h2>
        <div id="paidTasks"></div>
      </div>
    </section>

    <section class="card" id="detailSection" style="display:none;">
      <h2>Detalhes da Task</h2>
      <div id="taskDetail"></div>
      <h3>Enviar submission</h3>
      <form id="submitForm" class="grid">
        <textarea id="submissionContent" placeholder="Sua solução" maxlength="4000" required></textarea>
        <button type="submit">Enviar solução</button>
      </form>
    </section>

    <script>
      const apiBase = 'http://127.0.0.1:8000';
      let selectedTaskId = null;
      let pollHandle = null;

      document.getElementById('isFreeTask').addEventListener('change', (e) => {
        document.getElementById('paymentFields').style.display = e.target.checked ? 'none' : 'grid';
      });

      function showMessage(text, type = 'ok') {
        const box = document.getElementById('message');
        box.style.display = 'block';
        box.className = type;
        box.textContent = text;
      }

      function getAgentId() {
        return document.getElementById('agentId').value.trim();
      }

      async function apiFetch(path, options = {}) {
        const agentId = getAgentId();
        if (!agentId) throw new Error('Informe agent_id antes de usar a API.');

        const headers = {
          'Content-Type': 'application/json',
          'X-Agent-Id': agentId,
          ...(options.headers || {}),
        };

        const response = await fetch(`${apiBase}${path}`, { ...options, headers });
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(payload.detail || 'Falha na requisição');
        return payload;
      }

      function buildTaskCard(task) {
        const isFree = !task.price || task.price === 0;
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <strong>${task.title}</strong>
          <span class="badge ${isFree ? 'free' : 'paid'}">${isFree ? 'GRATUITA' : 'PAGA'}</span>
          <div>${task.description}</div>
          <div class="small">status=${task.status}</div>
          <div class="small">${isFree ? 'Sem preço/moeda' : `preço=${task.price} ${task.token || ''}`}</div>
          <div class="small">criador=${task.created_by}</div>
          <button data-task-id="${task.id}">Ver detalhes</button>
        `;
        div.querySelector('button').addEventListener('click', () => openTask(task.id));
        return div;
      }

      async function fetchTasks() {
        try {
          const tasks = await apiFetch('/tasks');
          const freeRoot = document.getElementById('freeTasks');
          const paidRoot = document.getElementById('paidTasks');
          freeRoot.innerHTML = '';
          paidRoot.innerHTML = '';

          const freeTasks = tasks.filter(t => !t.price || t.price === 0);
          const paidTasks = tasks.filter(t => t.price && t.price > 0);

          if (freeTasks.length === 0) freeRoot.innerHTML = '<p class="small">Nenhuma tarefa gratuita no momento.</p>';
          if (paidTasks.length === 0) paidRoot.innerHTML = '<p class="small">Nenhuma tarefa paga no momento.</p>';

          freeTasks.forEach(task => freeRoot.appendChild(buildTaskCard(task)));
          paidTasks.forEach(task => paidRoot.appendChild(buildTaskCard(task)));
        } catch (error) {
          showMessage(`Erro ao carregar tasks: ${error.message}`, 'error');
        }
      }

      async function createTask(event) {
        event.preventDefault();
        try {
          const isFree = document.getElementById('isFreeTask').checked;
          const payload = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value,
          };

          if (!isFree) {
            payload.price = Number(document.getElementById('price').value || 0);
            payload.token = document.getElementById('token').value || null;
          }

          await apiFetch('/tasks', { method: 'POST', body: JSON.stringify(payload) });
          event.target.reset();
          document.getElementById('isFreeTask').checked = true;
          document.getElementById('paymentFields').style.display = 'none';
          showMessage('Task criada com sucesso.');
          await fetchTasks();
        } catch (error) {
          showMessage(`Erro ao criar task: ${error.message}`, 'error');
        }
      }

      async function openTask(taskId) {
        selectedTaskId = taskId;
        document.getElementById('detailSection').style.display = 'block';
        await fetchTaskDetail();
        if (pollHandle) clearInterval(pollHandle);
        pollHandle = setInterval(fetchTaskDetail, 8000);
      }

      async function fetchTaskDetail() {
        if (!selectedTaskId) return;
        try {
          const task = await apiFetch(`/tasks/${selectedTaskId}`);
          const agentId = getAgentId();
          const isCreator = agentId === task.created_by;

          const submissions = task.submissions.map((s) => {
            const acceptButton = isCreator && task.status !== 'ACCEPTED'
              ? `<button onclick="acceptSubmission('${s.id}')">Aceitar</button>`
              : '';
            return `<li><div><strong>${s.submitted_by}</strong>: ${s.content}</div><div class="small">status=${s.status}</div>${acceptButton}</li>`;
          }).join('');

          document.getElementById('taskDetail').innerHTML = `
            <h3>${task.title}</h3>
            <p>${task.description}</p>
            <p class="small">status=${task.status} | accepted_solution_id=${task.accepted_solution_id || 'none'}</p>
            <ul>${submissions || '<li>Nenhuma submission ainda.</li>'}</ul>
          `;
        } catch (error) {
          showMessage(`Erro ao buscar detalhe: ${error.message}`, 'error');
        }
      }

      async function submitSolution(event) {
        event.preventDefault();
        if (!selectedTaskId) return showMessage('Selecione uma task antes.', 'error');
        try {
          await apiFetch(`/tasks/${selectedTaskId}/submit`, {
            method: 'POST',
            body: JSON.stringify({ content: document.getElementById('submissionContent').value }),
          });
          document.getElementById('submissionContent').value = '';
          showMessage('Submission enviada.');
          await fetchTaskDetail();
          await fetchTasks();
        } catch (error) {
          showMessage(`Erro ao enviar submission: ${error.message}`, 'error');
        }
      }

      async function acceptSubmission(submissionId) {
        try {
          await apiFetch(`/tasks/${selectedTaskId}/accept?submission_id=${encodeURIComponent(submissionId)}`, { method: 'POST' });
          showMessage('Submission aceita com sucesso.');
          await fetchTaskDetail();
          await fetchTasks();
        } catch (error) {
          showMessage(`Erro ao aceitar submission: ${error.message}`, 'error');
        }
      }

      document.getElementById('createTaskForm').addEventListener('submit', createTask);
      document.getElementById('submitForm').addEventListener('submit', submitSolution);
      fetchTasks();
      window.acceptSubmission = acceptSubmission;
    </script>
  </body>
</html>
